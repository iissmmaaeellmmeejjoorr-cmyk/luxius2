<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streetwear Shop</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #0e0e0e;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: black;
    }

    header h1 {
      margin: 0;
      font-size: 2em;
      letter-spacing: 3px;
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: #111;
      border-bottom: 1px solid #222;
    }

    nav a {
      color: #aaa;
      padding: 15px 20px;
      text-decoration: none;
      font-size: 0.9em;
    }

    nav a:hover { color: white; }

    .hero {
      height: 70vh;
      background: url('https://images.unsplash.com/photo-1523398002811-999ca8dec234') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero h2 {
      background: rgba(0,0,0,0.7);
      padding: 20px 30px;
      font-size: 2em;
    }

    .container {
      padding: 40px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .product {
      position: relative;
      overflow: hidden;
    }

    .product img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .product:hover img { transform: scale(1.1); }

    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 15px;
    }

    .overlay h3 { margin: 0; }
    .overlay p { margin: 5px 0; color: #ccc; }
    .overlay button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
      font-size: 0.8em;
    }

    .cart {
      position: fixed;
      top: 10px;
      right: 10px;
      background: white;
      color: black;
      padding: 10px;
      border-radius: 5px;
      font-size: 0.9em;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
      font-size: 0.8em;
      color: #777;
    }
  </style>
</head>
<body>

<div class="cart">🛒 Carrito: <span id="cart-count">0</span></div>

<header>
  <h1>STREETWEAR</h1>
</header>

<nav>
  <a href="#">Inicio</a>
  <a href="#">Drops</a>
  <a href="#">Colección</a>
  <a href="#">Contacto</a>
</nav>

<section class="hero">
  <h2>NEW DROP 2026</h2>
</section>

<div class="container">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1516826957135-700dedea698c">
    <div class="overlay">
      <h3>Urban Hoodie</h3>
      <p>49€</p>
      <button onclick="addToCart(49)">Comprar</button>
    </div>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1520975922284-9e0ce827a0c4">
    <div class="overlay">
      <h3>Oversize Tee</h3>
      <p>29€</p>
      <button onclick="addToCart(29)">Comprar</button>
    </div>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
    <div class="overlay">
      <h3>Baggy Jeans</h3>
      <p>59€</p>
      <button onclick="addToCart(59)">Comprar</button>
    </div>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1539185441755-769473a23570">
    <div class="overlay">
      <h3>Full Fit</h3>
      <p>99€</p>
      <button onclick="addToCart(99)">Comprar</button>
    </div>
  </div>

</div>

<footer>
  <p>© 2026 STREETWEAR BRAND</p>
</footer>

<script>
  let count = 0;
  let total = 0;
  function addToCart(price) {
    count++;
    total += price;
    document.getElementById('cart-count').innerText = count + ' (Total: €' + total + ')';
    alert('Producto añadido al carrito! Total: €' + total);
  }

  // Stripe example (simulated)
  async function checkout() {
    alert('Simulando pago con Stripe...');
    // Aquí iría la integración real con Stripe
  }
</script>

</body>
</html>
